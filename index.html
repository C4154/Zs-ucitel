<!DOCTYPE html>
<html lang="cs" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Školní testy – Učitelka</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<style>
:root{--bg:#f0f2f5;--paper:#fff;--text:#1a1a2e;--muted:#6c757d;--b:#dee2e6;--pr:#4361ee;--ok:#2ecc71;--bad:#e74c3c;--war:#f39c12;--r:12px}
[data-theme="dark"]{--bg:#0f0f1a;--paper:#1a1a2e;--text:#e0e0e0;--muted:#a0a0a0;--b:#2d2d44}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--b)}
h1{font-size:1.3rem}
.btn{padding:12px 18px;border:none;border-radius:var(--r);font-size:1rem;font-weight:600;cursor:pointer;width:100%;margin-top:10px}
.btn:hover{opacity:.9}.btn-pr{background:var(--pr);color:#fff}.btn-ok{background:var(--ok);color:#fff}.btn-bad{background:var(--bad);color:#fff}.btn-war{background:var(--war);color:#fff}.btn-gr{background:var(--bg);border:2px solid var(--b);color:var(--text)}
.row{display:flex;gap:8px}.row .btn{width:auto;flex:1;margin-top:0}
.box{background:var(--paper);border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--b);padding:20px;margin-bottom:14px}
label{display:block;font-weight:600;margin:12px 0 4px;font-size:.9rem}
input,select{width:100%;padding:10px;border:2px solid var(--b);border-radius:var(--r);font-size:1rem;background:var(--paper);color:var(--text)}
input:focus,select:focus{outline:none;border-color:var(--pr)}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:700;background:var(--bg);color:var(--muted);margin-right:4px}
.tag.bl{background:#e3f2fd;color:#1565c0}.tag.gr{background:#e8f5e9;color:#2e7d32}
table{width:100%;border-collapse:collapse;font-size:.9rem}th,td{padding:10px;border-bottom:1px solid var(--b);text-align:left}
th{font-size:.7rem;text-transform:uppercase;color:var(--muted)}
.qb{border:2px solid var(--b);border-radius:var(--r);padding:16px;margin-bottom:10px;background:rgba(0,0,0,.02)}
.ol{display:flex;gap:8px;margin-bottom:6px;align-items:center}.ol input[type=radio]{width:18px;height:18px}.ol input[type=text]{flex:1}
.cm{display:flex;gap:8px;align-items:center;padding:10px;background:var(--bg);border-radius:var(--r);margin-bottom:8px}
.cm input{flex:1;margin:0}.cm .btn{width:auto;padding:6px 14px;margin:0}
.hide{display:none!important}.c{text-align:center}.s{font-size:.85rem;color:var(--muted)}.mt{margin-top:12px}
.th{background:var(--paper);border:2px solid var(--b);border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem}
@media(max-width:480px){.row{flex-direction:column}}
</style>
</head>
<body>
<div class="wrap">
<div class="header"><h1>👩‍🏫 Školní testy</h1><button class="th" onclick="toggleTheme()">🌓</button></div>

<div id="p-login"><div class="box"><h2 class="c">Přístup pro učitelku</h2><input type="password" id="pw" placeholder="Zadej heslo" style="margin-top:16px" onkeydown="if(event.key==='Enter')check()"><button class="btn btn-pr mt" onclick="check()">Přihlásit</button></div></div>

<div id="p-dash" class="hide"><div class="c mb"><h2>Přehled</h2><p class="s" id="st">Načítání...</p></div><div class="row mb"><button class="btn btn-ok" onclick="go('new')">+ Test</button><button class="btn btn-war" onclick="go('cats')">Kategorie</button><button class="btn btn-gr" onclick="logout()">Odhlásit</button></div><div id="list"></div></div>

<div id="p-cats" class="hide"><h2 class="c mb">Kategorie</h2>
<div class="box"><h3 class="mb">Předměty</h3><div id="ls"></div>
<div class="cm mt"><input id="ns" placeholder="Název předmětu" style="flex:1"></div>
<label>Vyber ikonku:</label><select id="em-sel" style="margin-bottom:10px"></select>
<button class="btn btn-pr" onclick="addSubj()">Přidat předmět</button>
</div>
<div class="box"><h3 class="mb">Třídy</h3><div id="lc"></div><div class="cm mt"><input id="nc" placeholder="např. 6. A"><button class="btn btn-pr" onclick="addClass()">+</button></div></div>
<button class="btn btn-gr mt" onclick="go('dash')">Zpět</button>
</div>

<div id="p-new" class="hide"><h2 class="c mb" id="et">Nový test</h2><div class="box"><input id="en" placeholder="Název testu"><label>Předmět</label><select id="es"></select><label>Třída</label><select id="ec"></select><label><input type="checkbox" id="esh" style="width:auto"> Zamíchat otázky</label></div><div class="box"><h3 class="mb">Otázky</h3><div id="eq"></div><button class="btn btn-war mt" onclick="aq()">+ Otázka</button></div><div class="row mt"><button class="btn btn-ok" onclick="save()">Uložit</button><button class="btn btn-gr" onclick="go('dash')">Zrušit</button></div></div>

<div id="p-res" class="hide"><h2 class="c mb" id="rt">Výsledky</h2><div class="box" style="overflow:auto"><table><thead><tr><th>Žák</th><th>Skóre</th><th>Datum</th></tr></thead><tbody id="tb"></tbody></table><p class="c s mt hide" id="re">Zatím nic.</p></div><button class="btn btn-gr mt" onclick="go('dash')">Zpět</button></div>
</div>

<script>
const cfg={apiKey:"AIzaSyCsEtg1GEGDbZDawmLk-sfQfdauHFJaiko",authDomain:"diar-4f2e8.firebaseapp.com",projectId:"diar-4f2e8",storageBucket:"diar-4f2e8.firebasestorage.app",messagingSenderId:"19490498944",appId:"1:19490498944:web:733ab182f3a1e09483f965"};
const PASS="jakub";
let db,ed=null,subjects=[],classes=[],tests=[],results=[];

const EMOJIS=[
{e:'📐',l:'Matematika'},{e:'🔢',l:'Počty'},{e:'📚',l:'Čeština'},{e:'✍️',l:'Psaní'},
{e:'🇬🇧',l:'Angličtina'},{e:'🇩🇪',l:'Němčina'},{e:'🇫🇷',l:'Francouzština'},{e:'🌍',l:'Jazyky'},
{e:'🔬',l:'Přírodopis'},{e:'🧬',l:'Biologie'},{e:'🌿',l:'Příroda'},{e:'🦋',l:'Zoologie'},
{e:'🌎',l:'Zeměpis'},{e:'🗺️',l:'Mapy'},{e:'🏔️',l:'Geografie'},{e:'🏛️',l:'Dějepis'},
{e:'📜',l:'Historie'},{e:'⚔️',l:'Dějiny'},{e:'🏛️',l:'Občanka'},{e:'🗳️',l:'Občanství'},
{e:'⚡',l:'Fyzika'},{e:'🔭',l:'Vesmír'},{e:'🧲',l:'Magnetismus'},{e:'🧪',l:'Chemie'},
{e:'⚗️',l:'Laboratoř'},{e:'🎵',l:'Hudebka'},{e:'🎹',l:'Hudba'},{e:'🎸',l:'Nástroje'},
{e:'🎨',l:'Výtvarka'},{e:'🖌️',l:'Malování'},{e:'✏️',l:'Kreslení'},{e:'⚽',l:'Tělocvik'},
{e:'🏃',l:'Sport'},{e:'🏀',l:'Míčové'},{e:'💻',l:'Informatika'},{e:'🖥️',l:'PC'},
{e:'⌨️',l:'Programování'},{e:'🔨',l:'Pracovní'},{e:'🪚',l:'Dílna'},{e:'🧵',l:'Ruční práce'},
{e:'🏠',l:'Rodinná výchova'},{e:'👨‍👩‍👧‍👦',l:'Rodina'},{e:'🍳',l:'Vaření'},{e:'🤝',l:'Etika'},
{e:'❤️',l:'Charakter'},{e:'🕊️',l:'Mír'},{e:'🎭',l:'Dramatická'},{e:'🎬',l:'Divadlo'},
{e:'🎪',l:'Herci'},{e:'📖',l:'Čtení'},{e:'📕',l:'Knihy'},{e:'🔖',l:'Čtenářský klub'},
{e:'🚦',l:'Dopravka'},{e:'🚗',l:'Auto'},{e:'🚲',l:'Kolo'},{e:'💰',l:'Finance'},
{e:'💳',l:'Ekonomika'},{e:'📈',l:'Byznys'}
];

try{firebase.initializeApp(cfg);db=firebase.firestore();console.log("Firebase OK")}catch(e){alert("Firebase chyba: "+e.message)}

function check(){if(document.getElementById('pw').value===PASS){localStorage.setItem('st_auth','1');loadAndGo('dash')}else{alert('Špatné heslo')}}
function logout(){localStorage.removeItem('st_auth');document.getElementById('pw').value='';go('login')}
function go(p){document.querySelectorAll('[id^="p-"]').forEach(e=>e.classList.add('hide'));document.getElementById('p-'+p).classList.remove('hide');window.scrollTo(0,0)}

function toggleTheme(){const h=document.documentElement,t=h.getAttribute('data-theme')=='light'?'dark':'light';h.setAttribute('data-theme',t);localStorage.setItem('theme',t)}
(function(){const t=localStorage.getItem('theme')||'light';document.documentElement.setAttribute('data-theme',t);if(localStorage.getItem('st_auth')==='1')loadAndGo('dash')})();

function fillEmSelect(){const s=document.getElementById('em-sel');s.innerHTML=EMOJIS.map(x=>`<option value="${x.e}">${x.e} ${x.l}</option>`).join('')}

// VŽDY načítá z Firebase
async function loadAndGo(p){
    go(p);
    if(!db)return;
    try{
        const[s,c,t,r]=await Promise.all([
            db.collection('subjects').get(),
            db.collection('classes').get(),
            db.collection('tests').orderBy('createdAt','desc').get(),
            db.collection('results').orderBy('date','desc').get()
        ]);
        subjects=s.docs.map(d=>({id:d.id,...d.data()}));
        classes=c.docs.map(d=>d.data().n||d.data().name);
        tests=t.docs.map(d=>({id:d.id,...d.data()}));
        results=r.docs.map(d=>({id:d.id,...d.data()}));
        if(p=='dash')renderDash();
        if(p=='cats'){renderCats();fillEmSelect();}
    }catch(e){console.error(e);document.getElementById('st').textContent='Chyba načítání'}
}

function renderDash(){
    document.getElementById('st').textContent=tests.length+' testů • '+results.length+' vyplnění';
    document.getElementById('list').innerHTML=tests.length?tests.map(x=>{
        const v=results.filter(z=>z.testId==x.id);
        const a=v.length?Math.round(v.reduce((p,q)=>p+q.score,0)/v.length):'-';
        return`<div class="box"><div style="display:flex;justify-content:space-between"><div><b>${x.title}</b><div class="s mt"><span class="tag bl">${x.subjectName||x.subject}</span><span class="tag">${x.class}</span></div></div><div class="c"><b style="font-size:1.2rem;color:var(--pr)">${a}${a!='-'?'%':''}</b><div class="s">průměr</div></div></div><div class="row mt"><button class="btn btn-pr" onclick="edit('${x.id}')">Upravit</button><button class="btn btn-war" onclick="vres('${x.id}')">Výsledky</button><button class="btn btn-bad" onclick="delTest('${x.id}')">🗑</button></div></div>`
    }).join(''):'<p class="c s">Zatím nic.</p>';
}

async function delTest(id){if(!confirm('Smazat?'))return;try{await db.collection('tests').doc(id).delete();tests=tests.filter(t=>t.id!=id);renderDash()}catch(e){alert('Chyba mazání')}}

function renderCats(){
    document.getElementById('ls').innerHTML=subjects.map((x,i)=>`<div class="cm"><span style="font-size:1.2rem">${x.e||x.emoji||'📖'}</span><b style="flex:1">${x.n||x.name}</b><button class="btn btn-bad" style="padding:4px 10px;font-size:.8rem" onclick="delSubj(${i})">✕</button></div>`).join('');
    document.getElementById('lc').innerHTML=classes.map((x,i)=>`<div class="cm"><b style="flex:1">${x}</b><button class="btn btn-bad" style="padding:4px 10px;font-size:.8rem" onclick="delClass(${i})">✕</button></div>`).join('');
}

async function addSubj(){
    const n=document.getElementById('ns').value.trim();if(!n)return;
    const e=document.getElementById('em-sel').value;
    const id='s'+Date.now();
    try{await db.collection('subjects').doc(id).set({n,e});subjects.push({id,n,e});document.getElementById('ns').value='';renderCats()}catch(e){alert('Chyba')}
}
async function delSubj(i){if(!confirm('Smazat?'))return;try{await db.collection('subjects').doc(subjects[i].id).delete();subjects.splice(i,1);renderCats()}catch(e){}}
async function addClass(){
    const n=document.getElementById('nc').value.trim();if(!n)return;
    try{await db.collection('classes').doc('c'+Date.now()).set({n});classes.push(n);document.getElementById('nc').value='';renderCats()}catch(e){alert('Chyba')}
}
async function delClass(i){if(!confirm('Smazat?'))return;const docs=await db.collection('classes').get();const toDel=docs.docs.find(d=>(d.data().n||d.data().name)==classes[i]);if(toDel)await db.collection('classes').doc(toDel.id).delete();classes.splice(i,1);renderCats()}

function init(){
    ed=null;document.getElementById('et').textContent='Nový test';document.getElementById('en').value='';document.getElementById('esh').checked=false;document.getElementById('eq').innerHTML='';
    document.getElementById('es').innerHTML=subjects.map(x=>`<option value="${x.id}">${x.e||x.emoji||'📖'} ${x.n||x.name}</option>`).join('');
    document.getElementById('ec').innerHTML=classes.map(x=>`<option>${x}</option>`).join('');
    aq();aq();
}
function aq(){
    const n=document.querySelectorAll('.qb').length;
    const d=document.createElement('div');d.className='qb';
    d.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><b>Otázka ${n+1}</b>${n>0?'<button class="btn btn-bad" style="padding:2px 8px;font-size:.8rem" onclick="this.parentElement.parentElement.remove();rn()">✕</button>':''}</div><input class="qt" placeholder="Text otázky"><div style="margin-top:8px">${[0,1,2,3].map(i=>`<div class="ol"><input type="radio" name="r${n}" value="${i}" ${i==0?'checked':''}><input class="ot" placeholder="${String.fromCharCode(65+i)}"></div>`).join('')}</div>`;
    document.getElementById('eq').appendChild(d);
}
function rn(){document.querySelectorAll('.qb').forEach((b,i)=>{b.querySelector('b').textContent='Otázka '+(i+1);b.querySelectorAll('input[type=radio]').forEach(r=>r.name='r'+i)})}

function edit(id){
    const t=tests.find(x=>x.id==id);if(!t)return;ed=id;go('new');
    document.getElementById('et').textContent='Upravit';document.getElementById('en').value=t.title;
    document.getElementById('es').value=t.subject;document.getElementById('ec').value=t.class;
    document.getElementById('esh').checked=t.shuffle||false;document.getElementById('eq').innerHTML='';
    t.questions.forEach((q,i)=>{
        const d=document.createElement('div');d.className='qb';
        d.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:8px"><b>Otázka ${i+1}</b>${i>0?'<button class="btn btn-bad" style="padding:2px 8px;font-size:.8rem" onclick="this.parentElement.parentElement.remove();rn()">✕</button>':''}</div><input class="qt" value="${q.q}"><div style="margin-top:8px">${q.o.map((o,j)=>`<div class="ol"><input type="radio" name="r${i}" value="${j}" ${j==q.a?'checked':''}><input class="ot" value="${o}"></div>`).join('')}</div>`;
        document.getElementById('eq').appendChild(d);
    });
}

async function save(){
    const title=document.getElementById('en').value.trim(),sid=document.getElementById('es').value,cls=document.getElementById('ec').value,sh=document.getElementById('esh').checked,sub=subjects.find(s=>s.id==sid);
    if(!title){alert('Zadej název');return}
    const qs=[];document.querySelectorAll('.qb').forEach(b=>{const q=b.querySelector('.qt').value.trim(),o=[...b.querySelectorAll('.ot')].map(x=>x.value.trim()),a=parseInt(b.querySelector('input[type=radio]:checked').value);if(!q||o.some(x=>!x)){alert('Vyplň vše');return}qs.push({q,o,a})});
    const d={id:ed||'t'+Date.now(),title,subject:sid,subjectName:sub?(sub.n||sub.name):sid,class:cls,shuffle:sh,questions:qs,createdAt:Date.now()};
    try{
        await db.collection('tests').doc(d.id).set(d);
        if(ed){const idx=tests.findIndex(t=>t.id==ed);tests[idx]=d}else{tests.push(d)}
        go('dash');
    }catch(e){alert('Chyba ukládání: '+e.message)}
}

function vres(id){
    const t=tests.find(x=>x.id==id),r=results.filter(x=>x.testId==id).sort((a,b)=>b.date-a.date);
    document.getElementById('rt').textContent='Výsledky: '+t.title;
    const b=document.getElementById('tb');
    if(!r.length){b.innerHTML='';document.getElementById('re').classList.remove('hide')}
    else{document.getElementById('re').classList.add('hide');b.innerHTML=r.map(x=>`<tr><td>${x.name}</td><td><span class="tag ${x.score>=70?'gr':'bl'}">${x.score}%</span></td><td class="s">${new Date(x.date).toLocaleDateString('cs')}</td></tr>`).join('')}
    go('res');
}
</script>
</body>
</html>
